site_name: Go Mastery Path
site_description: A structured, module-wise Go training program from entry level to master level.
site_url: https://sigilipelli.github.io/go-mastery-path/
repo_url: https://github.com/SIGILIPELLI/go-mastery-path
repo_name: go-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & First Program": level-1/01-setup.md
      - "02 · Variables, Types & Operators": level-1/02-variables-types-operators.md
      - "03 · Control Flow": level-1/03-control-flow.md
      - "04 · Functions & Multiple Returns": level-1/04-functions-multiple-returns.md
      - "05 · Arrays, Slices & Maps": level-1/05-arrays-slices-maps.md
      - "06 · Structs": level-1/06-structs.md
      - "07 · Pointers": level-1/07-pointers.md
      - "08 · Error Handling": level-1/08-error-handling.md
      - "09 · Packages & Modules": level-1/09-packages-modules.md
      - "10 · Project — CLI To-Do App": level-1/10-project-todo-cli.md
  - "Level 2 · Intermediate":
      - Overview: level-2/index.md
      - "01 · Interfaces": level-2/01-interfaces.md
      - "02 · Goroutines & Channels Basics": level-2/02-goroutines-channels.md
      - "03 · Methods & Receivers": level-2/03-methods-receivers.md
      - "04 · Custom Errors & Error Wrapping": level-2/04-custom-errors-wrapping.md
      - "05 · JSON Encoding/Decoding": level-2/05-json-encoding-decoding.md
      - "06 · Testing with the testing Package": level-2/06-testing-package.md
